name: Purge jsDelivr CDN

on:
  push:
    branches: [main]
    paths: ['kvs.js']

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr cache
        run: |
          echo "Purging @main..."
          curl -s "https://purge.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@main/kvs.js" | jq .
          sleep 10
          curl -s "https://purge.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@main/kvs.js" | jq .
          sleep 10
          curl -s "https://purge.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@main/kvs.js" | jq .

          echo ""
          echo "=== Direct commit URL (always works, no caching) ==="
          echo "https://cdn.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@${{ github.sha }}/kvs.js"
          echo ""
          echo "If @main is stale, use the commit URL above in Ecwid."
