name: Purge jsDelivr CDN

on:
  push:
    branches: [main]
    paths: ['kvs.js']

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: Purge jsDelivr cache
        run: |
          curl -s "https://purge.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@main/kvs.js" | jq .
          # Wait 5 seconds and purge again to be safe
          sleep 5
          curl -s "https://purge.jsdelivr.net/gh/kootenayvapeshop/kvs-scripts@main/kvs.js" | jq .
          echo "CDN cache purged for kvs.js"
